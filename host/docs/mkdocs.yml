site_name: Ultralight Tags User Guide
site_description: User guides for the Ultralight Tags host applications.
site_author: Indiana University

docs_dir: src
site_dir: site
use_directory_urls: false

theme:
  name: material
  icon:
    logo: material/bird
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Applications:
      - Qt Program: apps/qtprogram.md
      - Qt Calibrate: apps/qtcalibrate.md
      - Tag Monitor: apps/qtmonitor.md
      - Bit Tag Visualizer: apps/btdataviz.md
      - SensorViz: apps/sensorviz.md
  - Command Line:
      - Overview: cli/index.md
      - tag-dwnld: cli/tag-dwnld.md
      - tag-info: cli/tag-info.md
      - tag-reset: cli/tag-reset.md
      - tag-start: cli/tag-start.md
      - tag-cal: cli/tag-cal.md
      - tag-test: cli/tag-test.md
      - tag-test-example: cli/tag-test-example.md
      - tag-monitor-test: cli/tag-monitor-test.md
  - Workflows:
      - First Setup: workflows/first-setup.md
      - Firmware Programming: workflows/firmware-programming.md
      - Calibration: workflows/calibration.md
      - Data Download: workflows/data-download.md
  - Reference:
      - Screenshots and Images: reference/images.md
      - Troubleshooting: reference/troubleshooting.md
